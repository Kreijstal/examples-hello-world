<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KreijstalWiki</title>
  <link rel="stylesheet" href="{{BASE_PATH}}/styles.css">
</head>
<body>
  <div id="header">
    <a href="{{BASE_PATH}}/" class="logo">KreijstalWiki<small>The free wiki</small></a>
    <form id="header-search" action="{{BASE_PATH}}/search/" method="get">
      <input type="text" name="q" placeholder="Search KreijstalWiki">
      <button type="submit">Search</button>
    </form>
  </div>
  <div id="wrapper">
    <div id="sidebar">
      <h3>Navigation</h3>
      <ul>
        <li><a href="{{BASE_PATH}}/">Main page</a></li>
        <li><a href="{{BASE_PATH}}/all-articles/">All articles</a></li>
        <li><a href="{{BASE_PATH}}/recent-changes/">Recent changes</a></li>
        <li><a href="{{BASE_PATH}}/search/">Search</a></li>
        <li><a href="{{BASE_PATH}}/wiki/about/">About</a></li>
      </ul>
    </div>
    <div id="content">
      <h1 class="page-title">Welcome to KreijstalWiki</h1>
      <p>A free, open wiki backed by Git. Anyone can edit.</p>
      <h2 id="article-content">Articles</h2>
      <ul class="article-list" id="article-list"></ul>
    </div>
  </div>
  <div id="footer">
    Content is available under open license. KreijstalWiki is powered by GitHub and Deno Deploy.
  </div>
  <script>
    fetch("{{BASE_PATH}}/search-index.json")
      .then(r => r.json())
      .then(articles => {
        const ul = document.getElementById("article-list");
        articles.forEach(a => {
          const li = document.createElement("li");
          li.innerHTML = `<a href="{{BASE_PATH}}/wiki/${a.slug}/">${a.title}</a>`;
          ul.appendChild(li);
        });
      });
  </script>
</body>
</html>
